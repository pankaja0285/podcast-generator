name: "Podcast Generator Updater"
author: "Ray Villalobos - PS"
description: "Generates a feed for a podcast from a YAML file"
runs:
  using: "docker" 
  image: "Dockerfile"
branding:
  icon: "git-branch"
  color: "red"
inputs:
# we had provided placeholder for user's email as one of the inputs in the entrypoint.sh
  email: 
    description: The committer's email address
    required: true
    default: ${{ github.actor }}@localhost
  name:
    description: The committer's name
    required: true
    default: ${{ github.actor }}
